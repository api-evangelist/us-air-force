    description: >-
      The Air Force OPEN Data Program provides public access to Department of the Air Force
      datasets, covering military installations, personnel data, research findings, and operational
      information. The program supports the DAF's API-first architecture initiative and makes
      government data accessible to the public through structured data downloads in CSV and JSON formats.
