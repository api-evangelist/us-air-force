        type: ReferenceArchitecture
      - url: https://software.af.mil/
        type: DeveloperPortal
    description: >-
      The Department of the Air Force API program provides a strategic framework for standardized
      APIs across the DAF enterprise. The DAF API Roadmap 2.0 and API Reference Architecture 2.0
      guide the implementation of a modern API ecosystem, enabling seamless integration across
      command-and-control systems, intelligence systems, and partner organizations. The API-first
      approach covers FY2024 through FY2026 implementation phases.
