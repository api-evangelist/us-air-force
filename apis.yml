description: >-
  The United States Air Force is responsible for providing air and space power to
  protect the United States and its interests. As part of the Department of the Air Force,
  the USAF has adopted an API-first architecture strategy to improve data sharing, software
  interoperability, and integration across military systems. The DAF publishes open datasets
  through data.af.mil and provides developer resources through software.af.mil.
